name: Release (reusable)

on:
  workflow_call:
    inputs:
      php-version:
        type: string
        default: '8.4'
      php-extensions:
        type: string
        default: 'mbstring, xml, ctype, iconv, intl'
      emit-sbom:
        description: Whether to emit a CycloneDX SBOM as a release artifact.
        type: boolean
        default: true
      generate-changelog:
        description: Whether to regenerate CHANGELOG.md from Conventional Commits.
        type: boolean
        default: true

# `GITHUB_TOKEN` is provided automatically and is reserved — it cannot
# be re-declared under `workflow_call.secrets`. The action below reads
# it via `secrets.GITHUB_TOKEN` / `github.token` directly.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ inputs.php-version }}
          extensions: ${{ inputs.php-extensions }}
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-dev --prefer-dist --no-interaction --no-progress

      - name: Install release tooling
        run: |
          composer global require --no-interaction \
            "marcocesarato/php-conventional-changelog:^3.0" \
            "cyclonedx/cyclonedx-php-composer:^5.0"
          echo "$HOME/.composer/vendor/bin" >> "$GITHUB_PATH"

      - name: Generate CHANGELOG (if enabled)
        if: inputs.generate-changelog
        run: conventional-changelog --commit-limit false --no-interaction || true

      - name: Emit CycloneDX SBOM (if enabled)
        if: inputs.emit-sbom
        run: |
          composer make-bom \
            --output-format=JSON \
            --output-file=sbom.cyclonedx.json
        continue-on-error: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            sbom.cyclonedx.json
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN || github.token }}
